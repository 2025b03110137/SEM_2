<!DOCTYPE html>
<html>
<head>
    <title>Largest Number Finder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        input {
            width: 80px;
            padding: 5px;
            margin: 5px;
        }
        button {
            padding: 8px 15px;
            margin-top: 10px;
        }
        #result {
            font-size: 20px;
            margin-top: 20px;
            color: blue;
        }
    </style>
</head>
<body>

    <h2>Largest Number Finder</h2>

    <input type="number" id="num1" placeholder="Number 1">
    <input type="number" id="num2" placeholder="Number 2">
    <input type="number" id="num3" placeholder="Number 3">
    <input type="number" id="num4" placeholder="Number 4">
    <input type="number" id="num5" placeholder="Number 5">

    <br>

    <button onclick="findLargest()">Find Largest</button>

    <div id="result"></div>

    <script>
        function findLargest() {
            let n1 = Number(document.getElementById("num1").value);
            let n2 = Number(document.getElementById("num2").value);
            let n3 = Number(document.getElementById("num3").value);
            let n4 = Number(document.getElementById("num4").value);
            let n5 = Number(document.getElementById("num5").value);

            let largest;

            if (n1 >= n2 && n1 >= n3 && n1 >= n4 && n1 >= n5) {
                largest = n1;
            }
            else if (n2 >= n1 && n2 >= n3 && n2 >= n4 && n2 >= n5) {
                largest = n2;
            }
            else if (n3 >= n1 && n3 >= n2 && n3 >= n4 && n3 >= n5) {
                largest = n3;
            }
            else if (n4 >= n1 && n4 >= n2 && n4 >= n3 && n4 >= n5) {
                largest = n4;
            }
            else {
                largest = n5;
            }

            document.getElementById("result").innerHTML =
                "Largest Number is: " + largest;
        }
    </script>

</body>
</html>
